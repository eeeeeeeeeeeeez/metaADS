<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡迎加入我們的 LINE 官方帳號</title>
    <style>
        /* 全局樣式 */
        :root {
            --line-green: #06C755;
            --line-hover: #05a346;
            --text-dark: #333;
            --bg-light: #f9f9f9;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* 容器設計 */
        .container {
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* 標題與內文 */
        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: var(--text-dark);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #666;
            margin-bottom: 30px;
        }

        /* 圖片/Logo 占位 */
        .profile-img {
            width: 100px;
            height: 100px;
            background-color: #eee;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 按鈕設計 */
        .cta-button {
            display: inline-block;
            background-color: var(--line-green);
            color: white;
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(6, 199, 85, 0.3);
            width: 80%;
        }

        .cta-button:hover {
            background-color: var(--line-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(6, 199, 85, 0.4);
        }

        .cta-button:active {
            transform: translateY(0);
        }

        /* 底部資訊 */
        .footer-note {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #999;
        }

        /* 動畫效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            animation: fadeIn 0.8s ease-out;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-img">
            <img src="https://img.icons8.com/color/144/line-me.png" alt="LINE Official Account">
        </div>

        <h1>專屬優惠與最新資訊</h1>
        <p>點擊下方按鈕加入我們的 LINE 官方帳號，<br>立即獲取第一手消息與限定好禮！</p>

        <a href="https://line.me/R/ti/p/@363upwpb?oat__id=6503316" class="cta-button">
            立即加入好友
        </a>

        <div class="footer-note">
            點擊後將自動跳轉至 LINE 應用程式
        </div>
    </div>

</body>
</html>
